services:
  leonie:
    image: ghcr.io/l8tenever/leonie:latest

    container_name: leonie

    ports:
      - "8080:8080"   # Redirect-Server
      - "8081:8081"   # Admin-Panel

    volumes:
      - ./data:/data  # Weiterleitungen werden hier gespeichert

    # Optional: Ports anpassen
    # environment:
    #   PORT: 8080
    #   ADMIN_PORT: 8081

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
