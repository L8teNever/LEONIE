# Redirect Server Configuration
# ================================
# Definiere hier alle Weiterleitungen.
# Format:
#   path: Der Pfad auf dem Server (z.B. /projekte)
#   target: Die Ziel-URL (z.B. https://meine-seite.de/projekte)
#   code: HTTP-Statuscode (301 = permanent, 302 = temporär)

server:
  port: 8080         # Port auf dem der Server läuft
  host: "0.0.0.0"   # Auf allen Interfaces lauschen

redirects:
  - path: /projekte
    target: https://example.com/projekte
    code: 301

  - path: /kontakt
    target: https://example.com/kontakt
    code: 302

  - path: /blog
    target: https://mein-blog.de
    code: 301

  # Fallback: Was passiert wenn kein Pfad passt?
  # Kommentiere die nächste Zeile ein um eine Standard-Weiterleitung zu setzen
  # default: https://example.com
